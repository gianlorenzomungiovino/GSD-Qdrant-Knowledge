name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Publish to npm
        uses: npm/actions-publish@v1
        with:
          package-manifest-path: './package.json'
          access: public

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract changelog for version
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          
          # Extract the section between ## VERSION and the next ## (or EOF)
          awk -v ver="## ${VERSION}" '
            $0 ~ "^## " ver "$" { found=1; next }
            /^## / && found { exit }
            found { print }
          ' CHANGELOG.md > release-body.md
          
          echo "body=$(cat release-body.md)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          draft: false
          prerelease: false
