name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract changelog for version
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          
          # Estrae la sezione tra ## VERSION e il prossimo ## (o EOF)
          awk -v ver="^## ${VERSION}$" '
            $0 ~ ver { found=1; next }
            /^## / && found { exit }
            found { print }
          ' CHANGELOG.md > release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          draft: false
          prerelease: false
