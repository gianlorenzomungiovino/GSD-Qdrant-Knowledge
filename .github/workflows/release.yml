- name: Extract changelog for version
  id: changelog
  run: |
    TAG="${{ github.ref_name }}"
    VERSION="${TAG#v}"

    # Estrae la sezione e salva in un file temporaneo
    awk -v ver="${VERSION}" '
      $0 ~ "^## " ver { found=1; next }
      /^## / && found { found=0; exit }
      found { print }
    ' CHANGELOG.md > release_notes.md

- name: Create GitHub Release
  uses: softprops/action-gh-release@v2
  with:
    # Invece di "body", usiamo "body_path" che legge direttamente dal file creato sopra
    body_path: release_notes.md
    files: |
      gsd-qdrant-knowledge-linux-amd64
      gsd-qdrant-knowledge-darwin-amd64
      gsd-qdrant-knowledge-windows-amd64.exe
    draft: false
    prerelease: false
