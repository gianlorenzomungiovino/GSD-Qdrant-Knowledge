name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract changelog for version
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          
          # Extract the section between ## VERSION and the next ## (or EOF)
          awk -v ver="${VERSION}" '
            BEGIN { pat = "^## " ver "$" }
            $0 ~ pat { found=1; next }
            /^## / && found { exit }
            found { print }
          ' CHANGELOG.md > release-body.md
          
          # Escape newlines for GitHub Actions environment variable
          BODY=$(sed -z 's/\n/\\n/g' release-body.md)
          echo "body=${BODY}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: "${{ steps.changelog.outputs.body }}"
          draft: false
          prerelease: false
